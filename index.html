
<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baby Jarvis</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        /* Custom styling to make the Markdown output look beautiful */
        .prose h1 { font-size: 1.5rem; font-weight: bold; margin-bottom: 1rem; color: #f3f4f6; }
        .prose h3 { font-size: 1.17rem; font-weight: bold; margin-top: 1.5rem; margin-bottom: 0.5rem; color: #9ca3af; }
        .prose p { margin-bottom: 1rem; line-height: 1.6; }
        .prose ul { list-style-type: disc; padding-left: 1.5rem; margin-bottom: 1rem; }
        .prose li { margin-bottom: 0.25rem; }
        .prose strong { color: #f9fafb; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 font-sans min-h-screen flex flex-col items-center p-8">

    <div class="w-full max-w-3xl">
        <div class="mb-8 text-center">
            <h1 class="text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400 mb-2">
                Baby Jarvis
            </h1>
            <p class="text-gray-400">Not that jarvis from MCU</p>
        </div>

        <div class="bg-gray-800 p-1 rounded-lg flex shadow-lg border border-gray-700 mb-8">
            <input type="text" id="queryInput" placeholder="Ask a complex question..." 
                   class="flex-grow bg-transparent text-white p-3 outline-none placeholder-gray-500">
            <button onclick="runAgent()" 
                    class="bg-blue-600 hover:bg-blue-500 text-white px-6 py-2 rounded-md font-semibold transition-colors">
                Research
            </button>
        </div>

        <div id="loading" class="hidden flex flex-col items-center justify-center text-gray-400 my-12">
            <svg class="animate-spin h-8 w-8 text-blue-500 mb-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            <p class="animate-pulse">Baby jarvis is working hardd bruh , have some patience ...</p>
        </div>

        <div id="outputContainer" class="hidden bg-gray-800 p-6 rounded-lg shadow-xl border border-gray-700">
            <div id="resultBox" class="prose prose-invert max-w-none text-gray-300"></div>
        </div>
    </div>

    <script>

        // Generate a random session ID when the page loads
        const sessionId = Math.random().toString(36).substring(2, 15);
        console.log("Session ID:", sessionId); 

        async function runAgent() {
            const query = document.getElementById('queryInput').value;
            if (!query) return;

            // Clear input box so user can type the next question
            document.getElementById('queryInput').value = '';

            // Update UI state
            document.getElementById('loading').classList.remove('hidden');
            document.getElementById('outputContainer').classList.add('hidden');

            try {
                // Call our FastAPI server
                const response = await fetch('/api/research', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query: query, thread_id: sessionId })
                });
                
                const data = await response.json();
                
                // Parse the Markdown and display it
                document.getElementById('resultBox').innerHTML = marked.parse(data.result);
                document.getElementById('outputContainer').classList.remove('hidden');
                
            } catch (error) {
                document.getElementById('resultBox').innerHTML = `<p class="text-red-400">Error connecting to agent.</p>`;
                document.getElementById('outputContainer').classList.remove('hidden');
            } finally {
                document.getElementById('loading').classList.add('hidden');
            }
        }
    </script>
</body>
</html>
